name: Build Android (armeabi-v7a & arm64-v8a)

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.5"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download & install Flutter
        run: |
          curl -sL "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz" -o /tmp/flutter.tar.xz
          tar xf /tmp/flutter.tar.xz -C /opt
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          flutter config --android-sdk /usr/local/lib/android/sdk
        shell: bash
      
      - name: Pre-cache Flutter artifacts
        run: flutter precache
        shell: bash
        
      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash
        
      - name: Build APK (split-per-abi)
        run: flutter build apk --split-per-abi
        shell: bash
        
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kazumi-android-apks
          path: build/app/outputs/flutter-apk/*.apk
