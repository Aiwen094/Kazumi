name: Build Android (armeabi-v7a & arm64-v8a)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Flutter via git clone
        run: |
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git /opt/flutter
          /opt/flutter/bin/flutter config --android-sdk /usr/local/lib/android/sdk
          /opt/flutter/bin/flutter precache
        shell: bash
      
      - name: Add Flutter to PATH
        run: echo "/opt/flutter/bin" >> $GITHUB_PATH
        shell: bash
      
      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash
      
      - name: Build APK (split-per-abi)
        run: flutter build apk --split-per-abi
        shell: bash
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kazumi-android-apks
          path: build/app/outputs/flutter-apk/*.apk
